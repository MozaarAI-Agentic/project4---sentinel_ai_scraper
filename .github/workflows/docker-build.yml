name: Docker Build

# Ce workflow existe précisément pour combler une limite honnêtement
# documentée (voir docs/deployment/docker-guide.md) : l'environnement de
# développement de ce projet n'a pas accès à Docker Hub, donc les
# Dockerfiles n'ont jamais pu être construits ni exécutés localement.
# Les runners GitHub Actions ont un accès réseau complet - c'est ici que
# ces images sont réellement validées pour la première fois.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build ${{ matrix.service }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [extraction-worker, api-gateway, recovery-engine]
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: false
          tags: sentinelai-${{ matrix.service }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  compose-smoke-test:
    name: docker compose up smoke test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v7

      - name: Prepare .env
        working-directory: infra
        run: cp .env.example .env

      - name: docker compose up
        working-directory: infra
        run: docker compose up --build -d

      - name: Wait for API Gateway health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/metrics > /dev/null; then
              echo "API Gateway is up"
              exit 0
            fi
            sleep 2
          done
          echo "API Gateway never became healthy"
          exit 1

      - name: docker compose logs (on failure)
        if: failure()
        working-directory: infra
        run: docker compose logs

      - name: Tear down
        if: always()
        working-directory: infra
        run: docker compose down -v
