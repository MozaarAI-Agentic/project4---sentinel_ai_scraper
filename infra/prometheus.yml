global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "api-gateway"
    static_configs:
      - targets: ["api-gateway:8000"]

  - job_name: "extraction-worker"
    static_configs:
      - targets: ["extraction-worker:8000"]

  - job_name: "recovery-engine"
    static_configs:
      - targets: ["recovery-engine:8000"]
